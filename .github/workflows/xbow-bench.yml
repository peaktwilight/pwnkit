name: XBOW Benchmark

on:
  workflow_dispatch:
  schedule:
    # Weekly on Sunday at 04:00 UTC
    - cron: "0 4 * * 0"

jobs:
  xbow:
    runs-on: ubuntu-latest
    timeout-minutes: 240 # 4 hours — 104 Docker challenge builds

    env:
      XBOW_PATH: /tmp/xbow-benchmarks

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Install Docker Compose
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq docker-compose-plugin

      - name: Clone XBOW validation benchmarks
        run: git clone --depth 1 https://github.com/xbow-engineering/validation-benchmarks "$XBOW_PATH"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Run XBOW benchmark (all 104 challenges)
        run: pnpm --filter @pwnkit/benchmark xbow

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xbow-results
          path: packages/benchmark/results/xbow-latest.json

      - name: Post summary
        if: always()
        run: |
          RESULTS="packages/benchmark/results/xbow-latest.json"
          if [ ! -f "$RESULTS" ]; then
            echo "### XBOW Benchmark" >> "$GITHUB_STEP_SUMMARY"
            echo "No results file produced — run may have crashed." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          TOTAL=$(jq '.results | length' "$RESULTS")
          PASS=$(jq '[.results[] | select(.pass == true)] | length' "$RESULTS")
          FAIL=$((TOTAL - PASS))
          echo "### XBOW Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total  | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pass   | $PASS  |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Fail   | $FAIL  |" >> "$GITHUB_STEP_SUMMARY"

name: XBOW Benchmark

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scan mode: black-box or white-box'
        required: false
        default: 'black-box'
        type: choice
        options:
          - black-box
          - white-box
      limit:
        description: 'Number of challenges to run'
        required: false
        default: '50'
      features:
        description: 'Feature flags: "all" (default), "none" (baseline), or "playbooks,memory" (specific)'
        required: false
        default: 'all'
  schedule:
    # Weekly on Sunday at 04:00 UTC
    - cron: "0 4 * * 0"

jobs:
  xbow:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      XBOW_PATH: /tmp/xbow-benchmarks
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_BASE_URL: ${{ secrets.AZURE_OPENAI_BASE_URL }}
      AZURE_OPENAI_MODEL: ${{ secrets.AZURE_OPENAI_MODEL }}
      AZURE_OPENAI_WIRE_API: ${{ secrets.AZURE_OPENAI_WIRE_API }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Clone XBOW validation benchmarks (patched fork -- fixes all 104 Docker builds)
        run: git clone --depth 1 https://github.com/0ca/xbow-validation-benchmarks-patched "$XBOW_PATH"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Install pentest tools
        run: |
          # Playwright for XSS challenges
          npm install -g playwright 2>/dev/null || true
          playwright install --with-deps chromium 2>/dev/null || echo "Playwright install skipped"
          # Common pentest tools the agent can use via bash
          sudo apt-get update -qq && sudo apt-get install -y -qq sqlmap nmap nikto 2>/dev/null || echo "Some pentest tools failed to install"

      - name: Configure feature flags
        run: |
          FEATURES="${{ inputs.features || 'all' }}"
          if [ "$FEATURES" = "none" ]; then
            echo "PWNKIT_FEATURE_EARLY_STOP=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_LOOP_DETECTION=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_CONTEXT_COMPACTION=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_SCRIPT_TEMPLATES=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_DYNAMIC_PLAYBOOKS=0" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_EXTERNAL_MEMORY=0" >> "$GITHUB_ENV"
            echo "Running with ALL features DISABLED (baseline)"
          elif [ "$FEATURES" = "all" ]; then
            echo "Running with default features (stable improvements ON, experimental OFF)"
          elif [ "$FEATURES" = "experimental" ]; then
            echo "PWNKIT_FEATURE_DYNAMIC_PLAYBOOKS=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_EXTERNAL_MEMORY=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_PROGRESS_HANDOFF=1" >> "$GITHUB_ENV"
            echo "PWNKIT_FEATURE_WEB_SEARCH=1" >> "$GITHUB_ENV"
            echo "Running with ALL features including experimental"
          else
            for f in $(echo "$FEATURES" | tr ',' ' '); do
              case "$f" in
                playbooks) echo "PWNKIT_FEATURE_DYNAMIC_PLAYBOOKS=1" >> "$GITHUB_ENV" ;;
                memory) echo "PWNKIT_FEATURE_EXTERNAL_MEMORY=1" >> "$GITHUB_ENV" ;;
                web_search) echo "PWNKIT_FEATURE_WEB_SEARCH=1" >> "$GITHUB_ENV" ;;
                handoff) echo "PWNKIT_FEATURE_PROGRESS_HANDOFF=1" >> "$GITHUB_ENV" ;;
              esac
            done
            echo "Running with features: $FEATURES"
          fi

      - name: Run XBOW benchmark
        run: |
          MODE="${{ inputs.mode || 'black-box' }}"
          LIMIT="${{ inputs.limit || '50' }}"
          if [ "$MODE" = "white-box" ]; then
            echo "Running WHITE-BOX (source-aware) benchmark..."
            pnpm --filter @pwnkit/benchmark xbow --agentic --white-box --limit "$LIMIT" --retries 3
          else
            echo "Running BLACK-BOX benchmark..."
            pnpm --filter @pwnkit/benchmark xbow --agentic --limit "$LIMIT" --retries 3
          fi
        timeout-minutes: 180

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xbow-results-${{ inputs.mode || 'black-box' }}-${{ inputs.features || 'all' }}
          path: packages/benchmark/results/xbow-latest.json

      - name: Post summary
        if: always()
        run: |
          MODE="${{ inputs.mode || 'black-box' }}"
          RESULTS="packages/benchmark/results/xbow-latest.json"
          if [ ! -f "$RESULTS" ]; then
            echo "### XBOW Benchmark ($MODE)" >> "$GITHUB_STEP_SUMMARY"
            echo "No results file produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          TOTAL=$(jq '.results | length' "$RESULTS")
          FLAGS=$(jq '[.results[] | select(.flagFound == true)] | length' "$RESULTS")
          BUILT=$(jq '[.results[] | select(.error == null or .error == "")] | length' "$RESULTS")
          BUILD_FAIL=$((TOTAL - BUILT))
          echo "### XBOW Benchmark Results ($MODE)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total challenges | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Flags extracted | $FLAGS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker build failures | $BUILD_FAIL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Score (flags / buildable)** | **$FLAGS / $BUILT** |" >> "$GITHUB_STEP_SUMMARY"
